# source: https://github.com/tmux/tmux

set -g default-terminal "tmux-256color"
set -g mouse on
set -ag terminal-overrides ",xterm-ghostty:Tc,*256color*:smcup@:rmcup@"
set -sg escape-time 0
set -g focus-events on
set -g history-limit 10000
set -g renumber-windows on
set -g detach-on-destroy off
set -g set-clipboard on
set -g base-index 1
set -g pane-base-index 1
set -g mode-keys vi

bind r source-file ~/.tmux.conf
bind | split-window -h
bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g window-status-format '[#{?@claude_waiting,#[fg=green] • #[fg=default],}#I: #W #F]'
set -g window-status-current-format '[#{?@claude_waiting,#[fg=green] • #[fg=default],}#I: #W #F]'

set -g status on
set -g status-style "fg=#665c54"
set -g status-left-style "fg=#928374"
set -g status-bg default
set -g status-position top
set -g status-justify centre
set -g status-interval 1
set -g status-left ""
set -g status-right ""
